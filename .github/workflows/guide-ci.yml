name: "Guide CI"

on:
  workflow_call:
    inputs:
      hugo-version:
        required: true
        type: string
      dart-sass-version:
        required: true
        type: string
      go-version:
        required: true
        type: string
      node-version:
        required: true
        type: string

jobs:
  hugo-build:
    name: Hugo Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Create directory for user-specific executable files
        run: |
          mkdir -p "${HOME}/.local"

      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${{ inputs.dart-sass-version }}/dart-sass-${{ inputs.dart-sass-version }}-linux-x64.tar.gz"
          tar -C "${HOME}/.local" -xf "dart-sass-${{ inputs.dart-sass-version }}-linux-x64.tar.gz"
          rm "dart-sass-${{ inputs.dart-sass-version }}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Install Hugo
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${{ inputs.hugo-version }}/hugo_extended_${{ inputs.hugo-version }}_linux-amd64.tar.gz"
          mkdir "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${{ inputs.hugo-version }}_linux-amd64.tar.gz"
          rm "hugo_extended_${{ inputs.hugo-version }}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Go: $(go version)"
          echo "Hugo: $(hugo version)"
          echo "Node.js: $(node --version)"

      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Configure Git
        run: |
          git config core.quotepath false

      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v5.0.5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: hugo-

      - name: Build the site
        run: |
          hugo build \
            --gc \
            --minify \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Cache save
        id: cache-save
        uses: actions/cache/save@v5.0.5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: html
          path: public

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: hugo-build
    permissions:
      contents: read
      packages: read

    steps:
      - name: Clone project
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Download html
        uses: actions/download-artifact@v8.0.1
        with:
          name: html
          path: public

      - name: Configure Qemu
        uses: docker/setup-qemu-action@v3

      - name: Configure docker buildx
        uses: docker/setup-buildx-action@v4.0.0

      - uses: docker/metadata-action@v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64 # Multi-arch
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: hugo-build
    permissions:
      contents: read
      packages: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Write default linter configs
        run: |
          mkdir -p .github/linters

          cat > .github/linters/zizmor.yaml << 'EOF'
          rules:
            unpinned-uses:
              config:
                policies:
                  actions/*: ref-pin
                  docker/*: ref-pin
                  github/*: ref-pin
                  gpeyet-learning/*: any
          EOF

          cat > .github/linters/.codespellrc << 'EOF'
          [codespell]
          skip = */content/*,*/public/*,*/themes/*,*/resources/*
          EOF

      - name: Download html
        uses: actions/download-artifact@v8.0.1
        with:
          name: html
          path: public

      - name: Super-linter
        uses: super-linter/super-linter@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Go source files in guide repos (go.mod is for Hugo Modules)
          VALIDATE_GO_MODULES: false
          # Prettier is the single formatter — Biome would conflict
          VALIDATE_BIOME_FORMAT: false
          # Content is in French — English terminology rules produce false positives
          VALIDATE_NATURAL_LANGUAGE: false
          # Content is in French — codespell produces false positives
          VALIDATE_SPELL_CODESPELL: false

  codeql:
    name: CodeQL Analysis
    uses: gpeyet-learning/.github/.github/workflows/guide-codeql.yml@main
    permissions:
      contents: read
      security-events: write
